name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            build_script: ./build/build-unix.sh
            artifact_name: fdm-gallery-linux
          - os: windows-latest
            build_script: ./build/build-windows.bat
            artifact_name: fdm-gallery-windows

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build ${{ matrix.os }}
        run: |
          cd ${{ matrix.os == 'ubuntu-latest' && 'build' || 'build' }}
          ${{ matrix.os == 'ubuntu-latest' && './build-unix.sh' || 'build-windows.bat' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: fdm-gallery.fda

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: fdm-gallery-linux
          path: .

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: fdm-gallery-windows
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            fdm-gallery.fda
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}